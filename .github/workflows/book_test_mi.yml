name: TEST – Hyrox Mittwoch 16:00 buchen

on:
  schedule:
    - cron: '1 15 * * 3'   # Mittwoch 16:01 MEZ = 15:01 UTC
  workflow_dispatch:

jobs:
  book:
    runs-on: ubuntu-latest
    env:
      MYSPORTS_EMAIL:    ${{ secrets.MYSPORTS_EMAIL }}
      MYSPORTS_PASSWORD: ${{ secrets.MYSPORTS_PASSWORD }}
      SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
      NOTIFY_EMAIL:      ${{ secrets.MYSPORTS_EMAIL }}
      COURSE_NAME:       "Hyrox Training"
      COURSE_WEEKDAY:    "2"
      COURSE_HOUR:       "16"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests python-dotenv
      - name: Kurs buchen (Test)
        run: python book.py
