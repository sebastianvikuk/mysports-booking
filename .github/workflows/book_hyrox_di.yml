name: Hyrox Training – Dienstag buchen

on:
  schedule:
    - cron: '0 17 * * 2'   # Winter MEZ  (UTC+1): 18:00 MEZ = 17:00 UTC
    - cron: '0 16 * * 2'   # Sommer MESZ (UTC+2): 18:00 MESZ = 16:00 UTC
  workflow_dispatch:

jobs:
  book:
    runs-on: ubuntu-latest
    env:
      MYSPORTS_EMAIL:    ${{ secrets.MYSPORTS_EMAIL }}
      MYSPORTS_PASSWORD: ${{ secrets.MYSPORTS_PASSWORD }}
      SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
      NOTIFY_EMAIL:      ${{ secrets.MYSPORTS_EMAIL }}
      COURSE_NAME:       "Hyrox Training"
      COURSE_WEEKDAY:    "1"
      COURSE_HOUR:       "18"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests python-dotenv
      - name: Kurs buchen
        run: python book.py
